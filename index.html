<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>英文阅读</title>
    <style>
        * {
            margin:0; padding:0; box-sizing:border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            background: #0f111a;
            color: #fff;
            padding: 20px 16px;
        }
        .title {
            font-size: 22px;
            text-align: center;
            margin-bottom: 16px;
        }
        .storage {
            background: #181b29;
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 16px;
        }
        .storage-head {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        #addBtn {
            background: #3b82f6;
            color: #fff;
            border:none;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 14px;
        }
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #12141f;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 15px;
            border: 1px solid #2d3142;
        }
        .item-text { flex:1; }
        .delete-btn {
            background: #ff3b30;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 13px;
        }
        textarea {
            width:100%;
            height:120px;
            background: #181b29;
            color:#fff;
            border:1px solid #2d3142;
            border-radius:14px;
            padding:14px;
            font-size:16px;
            margin-bottom:12px;
        }
        .controls {
            display: flex;
            gap:10px;
            margin-bottom:16px;
        }
        .controls button {
            flex:1;
            padding:14px 0;
            border-radius:12px;
            border:none;
            background:#3b82f6;
            color:#fff;
            font-size:16px;
        }
        .controls .gray {
            background:#2a2e3d;
        }
        .reader {
            background:#12141f;
            border-radius:20px;
            height:420px;
            overflow:hidden;
            border:1px solid #2d3142;
        }
        .content {
            padding:24px 16px;
            font-size:20px;
            line-height:2;
        }
        .speed {
            text-align:center;
            margin:16px 0;
            color:#999;
            font-size:14px;
        }
        input[type="range"] {
            width:280px;
            height:6px;
            background:#333;
            border-radius:3px;
            -webkit-appearance:none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance:none;
            width:20px; height:20px;
            background:#3b82f6;
            border-radius:50%;
        }
    </style>
</head>
<body>
<div class="title">英文滚动阅读</div>
<div class="storage">
    <div class="storage-head">
        <span>我的文本</span>
        <button id="addBtn">添加文本</button>
    </div>
    <div id="list"></div>
</div>
<textarea id="editor" placeholder="输入文本..."></textarea>
<div class="controls">
    <button id="start">开始</button>
    <button class="gray" id="pause">暂停</button>
    <button class="gray" id="reset">重置</button>
</div>
<div class="speed">
    WPM速度：<span id="wpmShow">160</span>
    <input type="range" id="wpm" min="60" max="800" value="160">
</div>
<div class="reader">
    <div class="content" id="box"></div>
</div>
<script>
    let texts = JSON.parse(localStorage.getItem('myTexts') || '[]');
    let current = '';
    let rafId = null;
    let y = 0;
    const listEl = document.getElementById('list');
    const editor = document.getElementById('editor');
    const box = document.getElementById('box');
    const addBtn = document.getElementById('addBtn');
    const start = document.getElementById('start');
    const pause = document.getElementById('pause');
    const reset = document.getElementById('reset');
    const wpm = document.getElementById('wpm');
    const wpmShow = document.getElementById('wpmShow');

    function render() {
        listEl.innerHTML = '';
        texts.forEach((txt, idx) => {
            let item = document.createElement('div');
            item.className = 'item';
            let textDiv = document.createElement('div');
            textDiv.className = 'item-text';
            textDiv.innerText = txt.substring(0, 30) + '...';
            textDiv.onclick = () => { current = txt; editor.value = txt; loadTxt(txt); };
            let delBtn = document.createElement('button');
            delBtn.className = 'delete-btn';
            delBtn.innerText = '删除';
            delBtn.onclick = () => { texts.splice(idx,1); save(); render(); };
            item.appendChild(textDiv);
            item.appendChild(delBtn);
            listEl.appendChild(item);
        });
    }

    function save() { localStorage.setItem('myTexts', JSON.stringify(texts)); }
    function loadTxt(t) { cancelAnimationFrame(rafId); y=0; box.innerText = t+'\n\n\n\n\n'+t; box.style.transform=`translateY(0px)`; }
    addBtn.onclick = () => { let v=editor.value.trim(); if(!v)return; if(!texts.includes(v)){ texts.push(v); save(); render(); } };
    function scroll() { let s=wpm.value*0.042778; y-=s/60; let h=box.offsetHeight/2; if(y<-h)y=0; box.style.transform=`translateY(${y}px)`; rafId=requestAnimationFrame(scroll); }
    start.onclick = () => { if(!current)return; cancelAnimationFrame(rafId); scroll(); };
    pause.onclick = () => cancelAnimationFrame(rafId);
    reset.onclick = () => { cancelAnimationFrame(rafId); y=0; loadTxt(current); };
    wpm.oninput = () => { wpmShow.innerText = wpm.value; };
    window.onload = () => { render(); if(texts.length>0){ current=texts[0]; editor.value=current; loadTxt(current); } };
</script>
</body>
</html>
